<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <input class="nav-toggle" id="nav-toggle" type="checkbox" />

    <header class="docs-topbar">
      <div class="docs-topbar__inner">
        <a class="docs-brand" href="{{ '/' | relative_url }}">
          <span>ggaction</span>
          <span class="docs-version">{{ site.version }}</span>
        </a>

        <nav class="docs-topnav" aria-label="Primary navigation">
          <a href="{{ '/getting-started/' | relative_url }}">Getting Started</a>
          <a href="{{ '/tutorials/scatterplot/' | relative_url }}">Tutorials</a>
          <a href="{{ '/reference/actions/' | relative_url }}">API Reference</a>
          <a href="{{ '/extension/action-authoring/' | relative_url }}">Extensions</a>
          <a href="{{ site.repository_url }}">GitHub</a>
        </nav>

        <label class="nav-toggle-button" for="nav-toggle" aria-label="Toggle documentation navigation">
          <span></span><span></span><span></span>
        </label>
      </div>
    </header>

    <div class="docs-shell">
      {%- include sidebar.html -%}

      <main class="docs-content" id="main-content" aria-label="Content">
        {{ content }}
      </main>
    </div>

    {%- include docs-footer.html -%}
    {%- include search-index.html -%}
    <script src="{{ '/assets/js/docs-search.js' | relative_url }}"></script>
  </body>
</html>
