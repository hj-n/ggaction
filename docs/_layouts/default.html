<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="docs-topbar">
      <div class="docs-topbar__inner">
        <a class="docs-brand" href="{{ '/' | relative_url }}">
          <span>ggaction</span>
          <span class="docs-version">{{ site.version }}</span>
        </a>

        <nav class="docs-topnav" aria-label="Primary navigation">
          <a href="{{ '/getting-started/' | relative_url }}">Getting Started</a>
          <a href="{{ '/recipes/' | relative_url }}">Chart Recipes</a>
          <a href="{{ '/reference/actions/' | relative_url }}">API Reference</a>
          <a href="{{ site.repository_url }}">GitHub</a>
        </nav>

        <button
          class="nav-toggle-button"
          id="nav-toggle-button"
          type="button"
          aria-label="Open documentation navigation"
          aria-controls="docs-sidebar"
          aria-expanded="false"
        >
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <button class="nav-backdrop" type="button" aria-label="Close documentation navigation"></button>

    <div class="docs-shell">
      {%- include sidebar.html -%}

      <main class="docs-content" id="main-content" aria-label="Content">
        {{ content }}
        {%- include page-navigation.html -%}
      </main>
    </div>

    {%- include docs-footer.html -%}
    {%- include search-index.html -%}
    <script src="{{ '/assets/js/docs-navigation.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/docs-toc.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/docs-content.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/docs-search.js' | relative_url }}"></script>
  </body>
</html>
