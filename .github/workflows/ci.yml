name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    strategy:
      matrix:
        node-version: [20, 22, 24]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit the packed package
        run: npm run package:check
      - name: Install Chromium for tutorial consumers
        run: npx playwright install --with-deps chromium
      - name: Test installed JavaScript, extension, PNG, and TypeScript consumers
        run: npm run test:package

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit, acceptance, and documentation tests
        run: npm test
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Test browser examples and the packed browser entry
        run: npm run test:browser
      - name: Render PNG regression charts
        run: npm run test:render

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Enforce coverage thresholds
        run: npm run test:coverage

  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Set up the documentation runtime
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.6"
          bundler-cache: true
      - name: Verify release-scoped documentation sources
        run: |
          npm run docs:signatures:check
          npm run docs:capabilities:check
          npm run test:docs
      - name: Build documentation with Jekyll
        run: npm run docs:build
      - name: Check built documentation
        run: npm run test:docs:built
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Test desktop and mobile documentation
        run: npm run test:docs:browser
