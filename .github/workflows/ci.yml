name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit, acceptance, and documentation tests
        run: npm test
      - name: Render PNG regression charts
        run: npm run test:render

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Enforce coverage thresholds
        run: npm run test:coverage

  documentation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify generated documentation artifacts
        run: |
          npm run docs:images
          npm run docs:llms
          npm run test:docs
          git diff --exit-code -- docs/assets/images/manifest.json docs/llms-full.txt
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build documentation with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Check built documentation
        run: npm run test:docs:built
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Test desktop and mobile documentation
        run: npm run test:docs:browser
