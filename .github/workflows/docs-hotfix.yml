name: One-time documentation deployment

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Exact reviewed documentation commit
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the reviewed documentation commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
      - name: Verify the checked-out commit
        env:
          REVIEWED_COMMIT: ${{ inputs.commit }}
        run: test "$(git rev-parse HEAD)" = "$(git rev-parse "$REVIEWED_COMMIT^{commit}")"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Set up the documentation runtime
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.6"
          bundler-cache: true
      - name: Verify documentation sources
        run: |
          npm run docs:signatures:check
          npm run docs:capabilities:check
          npm run docs:actions:check
          npm run docs:reference:check
          npm run docs:metadata:check
          npm run docs:search:check
          npm run test:docs
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build documentation
        run: npm run docs:build
      - name: Check built documentation
        run: npm run test:docs:built
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy the reviewed documentation
        id: deployment
        uses: actions/deploy-pages@v4
